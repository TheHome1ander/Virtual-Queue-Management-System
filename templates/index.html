<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
    <style> {% include 'style.css' %} </style>
    <script>
        function toggleForm(type) {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('signup-form').style.display = 'none';
            document.getElementById(type + '-form').style.display = 'block';
        }
    </script>
</head>
<body style="display:flex; justify-content:center; align-items:center; min-height:100vh;">

    <div class="card fade-in" style="width: 400px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="font-size: 24px;">Queue Manager</h1>
            <div style="display: flex; justify-content: center; gap: 10px; margin-top: 20px;">
                <button class="secondary" onclick="toggleForm('login')" style="width: auto;">Log In</button>
                <button class="secondary" onclick="toggleForm('signup')" style="width: auto;">Owner Sign Up</button>
            </div>
        </div>

        <!-- Login Form -->
        <div id="login-form">
            <h2>Log In</h2>

            <!-- Error Message Block -->
            {% if error %}
            <div style="background: #ffcccc; color: #cc0000; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; text-align: center;">
                {{ error }}
            </div>
            {% endif %}

            <form action="/login" method="post">
                <label style="display:block; text-align:left; font-size:12px; margin-bottom:5px; color:#888;">I am a:</label>
                <select name="role">
                    <option value="owner">Shop Owner</option>
                    <option value="admin">Admin</option>
                </select>
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Sign In</button>
            </form>
        </div>

        <!-- Owner Signup Form -->
        <div id="signup-form" style="display:none;">
            <h2>Partner with us</h2>
            <p style="color:#86868b; font-size: 14px; margin-bottom:20px;">Create account & register your first shop.</p>
            <form action="/signup-owner" method="post">
                <input type="text" name="username" placeholder="Choose a Username" required>
                <input type="password" name="password" placeholder="Choose a Password" required>
                <hr style="border:0; border-top:1px solid #e5e5e5; margin: 20px 0;">
                <input type="text" name="shop_name" placeholder="Shop Name" required>
                <input type="text" name="owner_real_name" placeholder="Your Full Name" required>
                <input type="text" name="contact" placeholder="Contact Number" required>
                <input type="text" name="location" placeholder="Shop Location (City/Area)" required>
                <button type="submit">Submit for Approval</button>
            </form>
        </div>
    </div>

</body>
</html>
